<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-VR 2077</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-N6ZDYTZE4F"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-N6ZDYTZE4F');
</script>

<body>

    <!-- Hero -->
    <header class="vh-100 bg-dark text-white d-flex flex-column justify-content-center align-items-center text-center">
        <h1 class="text-uppercase mb-3">Cyber-VR 2077</h1>
        <p class="fs-4 mb-4">Занурся у нову реальність вже сьогодні</p>
        <button class="btn btn-primary btn-lg btn-neon">Грати зараз</button>
    </header>

    <!-- Features -->
    <section class="container my-5">
        <h1 class="text-center mb-4">Особливості гри</h1>

        <div class="d-flex justify-content-center gap-4 flex-wrap">

            <!-- Card 1 -->
            <div class="card" style="max-width: 18rem;">
                <img src="img/card_1.png" class="card-img-top" alt="VR">
                <div class="card-body">
                    <h5 class="card-title text-primary">Графіка 4K</h5>
                    <p class="card-text">Найвища деталізація текстур для повного реалізму.</p>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="card" style="max-width: 18rem;">
                <img src="img/card_2.png" class="card-img-top" alt="Action">
                <div class="card-body">
                    <h5 class="card-title text-danger">Занурення</h5>
                    <p class="card-text">Відчуй кожен рух завдяки новітнім сенсорам.</p>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="card" style="max-width: 18rem;">
                <img src="img/card_3.png" class="card-img-top" alt="World">
                <div class="card-body">
                    <h5 class="card-title text-success">Мультиплеєр</h5>
                    <p class="card-text">Грай разом з друзями по всьому світу без затримок.</p>
                </div>
            </div>

        </div>
    </section>


 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>

</html>
